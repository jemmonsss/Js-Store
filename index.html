<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Js-Scripts</title>
  <meta name="description" content="Js-Scripts - Scripts and Resources">
  
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header>
    <nav>
      <div class="nav-container">
        <a href="index.html" class="logo">Js-Scripts</a>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="https://github.com/" target="_blank">GitHub</a>
          <a href="https://www.youtube.com/@J_emmons_07/videos" target="_blank">YouTube</a>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <div class="store-header">
      <h1>Js-Scripts</h1>
      <p>Browse my scripts and resources</p>
    </div>

    <div class="scripts-container" id="scripts-container">
      <!-- Scripts will be loaded here -->
    </div>
  </main>

  <footer>
    <p>Js-Scripts</p>
  </footer>

  <!-- README Modal -->
  <div id="readme-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">README</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modal-body">
        <div class="modal-loading">Loading README...</div>
      </div>
    </div>
  </div>

  <script>
    let fivemScripts = [];

    // Load scripts from config file
    async function loadScriptsConfig() {
      try {
        const response = await fetch('scripts-config.json');
        const config = await response.json();
        fivemScripts = config.fivem_scripts || [];
        renderScripts(fivemScripts, 'scripts-container');
      } catch (error) {
        console.error('Error loading scripts config:', error);
        // Fallback to example if config fails to load
        fivemScripts = [
          {
            name: "Example Script",
            repo: "username/example-repo",
            youtube_id: "dQw4w9WgXcQ"
          }
        ];
        renderScripts(fivemScripts, 'scripts-container');
      }
    }

    // Render scripts
    function renderScripts(scripts, containerId, isPaid = false) {
      const container = document.getElementById(containerId);
      
      scripts.forEach((script, index) => {
        const card = document.createElement('div');
        card.className = isPaid ? 'script-card paid-card' : 'script-card';
        card.dataset.repo = script.repo || '';
        card.dataset.youtube = script.youtube_id;
        card.dataset.tebex = script.tebex_url || '';
        
        let buttons = '';
        let description = '';
        let stats = '';
        const hasTebex = script.tebex_url;
        const hasGithub = script.repo;
        
        if (isPaid) {
          buttons = `
            <div class="button-group">
              <a href="${script.tebex_url}" target="_blank" class="view-repo-btn paid-btn">💎 Purchase on Tebex</a>
            </div>
          `;
          description = script.description || 'No description available';
          stats = '';
        } else {
          // Free scripts can have Tebex, GitHub, or both
          if (hasTebex && hasGithub) {
            buttons = `
              <div class="button-group">
                <a href="${script.tebex_url}" target="_blank" class="view-repo-btn">📥 Get on Tebex</a>
                <a href="https://github.com/${script.repo}" target="_blank" class="view-repo-btn">View on GitHub</a>
                <button class="readme-btn" onclick="showReadme('${script.repo}')">📄 README</button>
              </div>
            `;
            description = 'Loading repository information...';
            stats = `
              <div class="stats">
                <span class="stars">⭐ <span class="star-count">-</span></span>
                <span class="language">🔷 <span class="lang-name">-</span></span>
                <span class="updated">📅 <span class="update-date">-</span></span>
              </div>
            `;
          } else if (hasTebex) {
            buttons = `
              <div class="button-group">
                <a href="${script.tebex_url}" target="_blank" class="view-repo-btn">📥 Get on Tebex</a>
              </div>
            `;
            description = script.description || 'No description available';
            stats = '';
          } else {
            buttons = `
              <div class="button-group">
                <a href="https://github.com/${script.repo}" target="_blank" class="view-repo-btn">View on GitHub</a>
                <button class="readme-btn" onclick="showReadme('${script.repo}')">📄 README</button>
              </div>
            `;
            description = 'Loading repository information...';
            stats = `
              <div class="stats">
                <span class="stars">⭐ <span class="star-count">-</span></span>
                <span class="language">🔷 <span class="lang-name">-</span></span>
                <span class="updated">📅 <span class="update-date">-</span></span>
              </div>
            `;
          }
        }
        
        card.innerHTML = `
          <div class="script-info">
            <h2>${script.name} ${isPaid ? '<span class="paid-badge">💎 Premium</span>' : ''}</h2>
            <div class="repo-details">
              <p class="description">${description}</p>
              ${stats}
            </div>
            ${buttons}
          </div>
          <div class="video-container">
            <iframe 
              id="youtube-${containerId}-${index}"
              src="" 
              data-src="https://www.youtube.com/embed/${script.youtube_id}?rel=0"
              frameborder="0" 
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
              allowfullscreen
              loading="lazy">
            </iframe>
          </div>
        `;
        
        container.appendChild(card);
      });

      // Load YouTube videos after page load
      const iframes = container.querySelectorAll('iframe[data-src]');
      iframes.forEach(iframe => {
        iframe.src = iframe.dataset.src;
      });

      // Fetch GitHub repository data only for free scripts with GitHub repos
      if (!isPaid) {
        const scriptCards = container.querySelectorAll('.script-card');
        scriptCards.forEach(card => {
          const repo = card.dataset.repo;
          const tebex = card.dataset.tebex;
          // Fetch GitHub data if there's a repo (regardless of Tebex)
          if (repo) {
            fetch(`https://api.github.com/repos/${repo}`)
              .then(response => response.json())
              .then(data => {
                if (data.message === 'Not Found') {
                  card.querySelector('.description').textContent = 'Repository not found';
                  return;
                }
                
                card.querySelector('.description').textContent = data.description || 'No description available';
                card.querySelector('.star-count').textContent = data.stargazers_count;
                card.querySelector('.lang-name').textContent = data.language || 'Unknown';
                
                const updatedDate = new Date(data.updated_at);
                card.querySelector('.update-date').textContent = updatedDate.toLocaleDateString();
              })
              .catch(error => {
                console.error('Error fetching repo data:', error);
                card.querySelector('.description').textContent = 'Error loading repository information';
              });
          }
        });
      }
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', loadScriptsConfig);

    // Modal functions
    function showReadme(repo) {
      const modal = document.getElementById('readme-modal');
      const modalTitle = document.getElementById('modal-title');
      const modalBody = document.getElementById('modal-body');
      
      modalTitle.textContent = 'README - ' + repo;
      modalBody.innerHTML = '<div class="modal-loading">Loading README...</div>';
      modal.classList.add('show');
      
      // Fetch README from GitHub
      fetch(`https://api.github.com/repos/${repo}/readme`)
        .then(response => {
          if (!response.ok) {
            throw new Error('README not found');
          }
          return response.json();
        })
        .then(data => {
          // Decode base64 content
          const content = atob(data.content);
          // Simple markdown to HTML conversion
          const htmlContent = simpleMarkdownToHTML(content);
          modalBody.innerHTML = htmlContent;
        })
        .catch(error => {
          console.error('Error fetching README:', error);
          modalBody.innerHTML = '<div class="modal-error">Could not load README. The repository may not have a README file.</div>';
        });
    }

    function closeModal() {
      const modal = document.getElementById('readme-modal');
      modal.classList.remove('show');
    }

    // Close modal when clicking outside
    document.getElementById('readme-modal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeModal();
      }
    });

    // Close modal with Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeModal();
      }
    });

    // Simple markdown to HTML converter
    function simpleMarkdownToHTML(markdown) {
      let html = markdown;
      
      // Headers
      html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
      html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
      html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
      
      // Bold and italic
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
      
      // Code blocks
      html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      
      // Links
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
      
      // Images
      html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
      
      // Blockquotes
      html = html.replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>');
      
      // Unordered lists
      html = html.replace(/^\* (.*$)/gim, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
      
      // Ordered lists
      html = html.replace(/^\d+\. (.*$)/gim, '<li>$1</li>');
      
      // Paragraphs
      html = html.replace(/\n\n/g, '</p><p>');
      html = '<p>' + html + '</p>';
      
      // Clean up empty paragraphs
      html = html.replace(/<p><\/p>/g, '');
      html = html.replace(/<p>(<h[1-6]>)/g, '$1');
      html = html.replace(/(<\/h[1-6]>)<\/p>/g, '$1');
      html = html.replace(/<p>(<pre>)/g, '$1');
      html = html.replace(/(<\/pre>)<\/p>/g, '$1');
      html = html.replace(/<p>(<ul>)/g, '$1');
      html = html.replace(/(<\/ul>)<\/p>/g, '$1');
      html = html.replace(/<p>(<blockquote>)/g, '$1');
      html = html.replace(/(<\/blockquote>)<\/p>/g, '$1');
      html = html.replace(/<p>(<img)/g, '$1');
      html = html.replace(/(<\/p>)<\/p>/g, '$1');
      
      return html;
    }
  </script>
</body>
</html>
